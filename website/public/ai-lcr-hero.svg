<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-label="ai-lcr keeps a cheapest-first list of providers per model: it serves the cheapest (TokenMart, −40% vs the priciest), fails over to the next on error, and snaps back to the cheapest after ~60s.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#11182f"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="479" height="269" rx="16" fill="url(#bg)" stroke="#222b44"/>

  <!-- header -->
  <text x="116" y="40" fill="#5b647d" font-size="10.5" font-weight="600" letter-spacing="0.6">CHEAPEST-FIRST LIST</text>

  <!-- savings badge -->
  <g>
    <rect x="338" y="26" width="124" height="24" rx="12" fill="#0b1120" stroke="#4fe39a" stroke-width="1"/>
    <circle cx="357" cy="38" r="3.4" fill="#4fe39a" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="369" y="42" font-size="12"><tspan fill="#97a3c0">saving </tspan><tspan fill="#4fe39a" font-weight="700">−40%</tspan></text>
  </g>

  <!-- request token -->
  <g>
    <rect x="18" y="128" width="60" height="34" rx="9" fill="#0e1626" stroke="#273253"/>
    <text x="48" y="143" text-anchor="middle" fill="#e9eef9" font-size="11.5" font-weight="600">call</text>
    <text x="48" y="156" text-anchor="middle" fill="#5b647d" font-size="8.5">lcr("smart")</text>
  </g>

  <!-- green wire request → cheapest (TokenMart), with a flowing packet -->
  <path d="M82,145 C104,145 96,91 116,91" fill="none" stroke="#4fe39a" stroke-width="2" opacity="0.85"/>
  <circle r="3.4" fill="#4fe39a" filter="url(#glow)">
    <animateMotion dur="1.4s" repeatCount="indefinite" calcMode="linear" path="M82,145 C104,145 96,91 116,91"/>
  </circle>

  <!-- TokenMart — serving (cheapest) -->
  <g>
    <rect x="116" y="70" width="312" height="42" rx="11" fill="#0b1120" stroke="#4fe39a" stroke-width="1.8" filter="url(#glow)"/>
    <circle cx="136" cy="91" r="4" fill="#4fe39a" filter="url(#glow)"/>
    <text x="152" y="88" fill="#e9eef9" font-size="12.5" font-weight="600">TokenMart</text>
    <text x="152" y="103" fill="#97a3c0" font-size="10.5">$0.30 / 1M <tspan fill="#4fe39a" font-weight="700">· −40%</tspan></text>
    <text x="416" y="95" text-anchor="end" fill="#4fe39a" font-size="10.5" font-weight="700">● serving</text>
  </g>

  <!-- auto-failover annotation (cheapest down → next in line) -->
  <path d="M244,112 L244,124" fill="none" stroke="#ffb35c" stroke-width="1.6" stroke-dasharray="3 4"/>
  <path d="M244,125 l-3.5,-6 l7,0 z" fill="#ffb35c"/>
  <text x="256" y="121.5" fill="#ffb35c" font-size="9.5" font-weight="600">if down → fails over</text>

  <!-- OpenRouter — next in line -->
  <g opacity="0.58">
    <rect x="116" y="124" width="312" height="42" rx="11" fill="#0b1120" stroke="#273253"/>
    <circle cx="136" cy="145" r="4" fill="#5b647d"/>
    <text x="152" y="142" fill="#e9eef9" font-size="12.5" font-weight="600">OpenRouter</text>
    <text x="152" y="157" fill="#97a3c0" font-size="10.5">$0.43 / 1M</text>
    <text x="416" y="149" text-anchor="end" fill="#5b647d" font-size="10">next in line</text>
  </g>

  <!-- Anthropic API -->
  <g opacity="0.58">
    <rect x="116" y="178" width="312" height="42" rx="11" fill="#0b1120" stroke="#273253"/>
    <circle cx="136" cy="199" r="4" fill="#5b647d"/>
    <text x="152" y="196" fill="#e9eef9" font-size="12.5" font-weight="600">Anthropic API</text>
    <text x="152" y="211" fill="#97a3c0" font-size="10.5">$0.50 / 1M</text>
  </g>

  <!-- caption -->
  <circle cx="18" cy="244" r="3.4" fill="#4fe39a"/>
  <text x="30" y="248" fill="#97a3c0" font-size="11">cheapest healthy provider, every call · fails over on error · snaps back after ~60s</text>
</svg>
